name: CD - Despliegue Continuo

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI - Integración Continua"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Solo desplegar si el CI pasó exitosamente
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Usar Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Instalar dependencias
      run: npm ci
    
    - name: Construir aplicación para producción
      run: npm run build
    
    - name: Desplegar a GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        cname: # Descomentar y agregar dominio personalizado si es necesario
    
    - name: Crear release automático
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Despliegue automático desde commit ${{ github.sha }}
          Rama: ${{ github.ref }}
        draft: false
        prerelease: false
